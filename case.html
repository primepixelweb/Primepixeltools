<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Case Converter – PrimePixel Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
--blue:#3bc1ff;
--card:#111827;
--text:#e5e7eb;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
font-family:'Inter',sans-serif;
color:var(--text);
}

/* PRELOADER */

#preloader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
transition:opacity .6s, visibility .6s;
}

#preloader.fade{
opacity:0;
visibility:hidden;
}

#preloader img{
width:170px;
margin-bottom:25px;
}

.loader{
width:150px;
height:2px;
background:#222;
overflow:hidden;
}

.loader::after{
content:'';
display:block;
height:100%;
width:50%;
background:var(--blue);
animation:load 1.2s infinite;
}

@keyframes load{
0%{transform:translateX(-100%)}
100%{transform:translateX(200%)}
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
border-bottom:1px solid rgba(59,193,255,.3);
position:sticky;
top:0;
background:#000;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
font-family:'Montserrat';
font-weight:800;
font-size:22px;
}

.logo img{
height:36px;
margin-right:10px;
}

.logo span{
color:var(--blue);
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
text-decoration:none;
color:white;
font-size:14px;
}

/* MOBILE MENU */

.menu-btn{
display:none;
font-size:26px;
cursor:pointer;
}

.mobile-menu{
display:none;
position:absolute;
top:70px;
right:20px;
background:#111;
border:1px solid rgba(59,193,255,.4);
border-radius:8px;
padding:20px;
flex-direction:column;
gap:15px;
}

.mobile-menu a{
text-decoration:none;
color:white;
}

/* PAGE */

.container{
max-width:800px;
margin:auto;
padding:80px 20px;
text-align:center;
}

.container h1{
font-family:'Montserrat';
font-size:40px;
margin-bottom:10px;
}

.container span{
color:var(--blue);
}

.container p{
color:#9ca3af;
margin-bottom:40px;
}

/* TOOL */

.converter{
background:var(--card);
padding:40px;
border-radius:10px;
border:1px solid rgba(255,255,255,.05);
}

textarea{
width:100%;
height:150px;
background:#000;
border:1px solid #333;
color:white;
padding:15px;
border-radius:6px;
resize:none;
}

.buttons{
margin-top:20px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

button{
padding:12px;
background:var(--blue);
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

/* FOOTER */

footer{
background:#0a0a0a;
text-align:center;
padding:40px;
margin-top:80px;
}

footer p{
color:#9ca3af;
}

/* MOBILE */

@media(max-width:768px){

.nav-links{
display:none;
}

.menu-btn{
display:block;
}

.mobile-menu.active{
display:flex;
}

.container h1{
font-size:28px;
}

.buttons{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<!-- PRELOADER -->

<div id="preloader">

<img src="preloader-logo.png">

<div class="loader"></div>

</div>

<!-- NAVBAR -->

<nav>

<div class="logo">

<img src="logo.png">

PrimePixel <span>Tools</span>

</div>

<div class="nav-links">

<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>

</div>

<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div class="mobile-menu" id="mobileMenu">

<a href="index.html" onclick="closeMenu()">Home</a>
<a href="index.html#tools" onclick="closeMenu()">Tools</a>

</div>

</nav>

<!-- CONTENT -->

<section class="container">

<h1>Case <span>Converter</span></h1>

<p>Convert text to uppercase, lowercase and more instantly</p>

<div class="converter">

<textarea id="textInput" placeholder="Enter your text here..."></textarea>

<div class="buttons">

<button onclick="upperCase()">UPPERCASE</button>
<button onclick="lowerCase()">lowercase</button>
<button onclick="capitalCase()">Capitalize Words</button>
<button onclick="sentenceCase()">Sentence Case</button>
<button onclick="copyText()">Copy Text</button>
<button onclick="clearText()">Clear</button>

</div>

</div>

</section>

<!-- FOOTER -->

<footer>

<p>© 2026 PrimePixel</p>

</footer>

<script>

/* PRELOADER */

window.onload=function(){

setTimeout(function(){

document.getElementById("preloader").classList.add("fade");

},1000);

};

/* MOBILE MENU */

function toggleMenu(){

document.getElementById("mobileMenu").classList.toggle("active");

}

function closeMenu(){

document.getElementById("mobileMenu").classList.remove("active");

}

/* CASE CONVERTER */

function upperCase(){

let text=document.getElementById("textInput");

text.value=text.value.toUpperCase();

}

function lowerCase(){

let text=document.getElementById("textInput");

text.value=text.value.toLowerCase();

}

function capitalCase(){

let text=document.getElementById("textInput");

text.value=text.value.replace(/\b\w/g,c=>c.toUpperCase());

}

function sentenceCase(){

let text=document.getElementById("textInput");

text.value=text.value.charAt(0).toUpperCase()+text.value.slice(1).toLowerCase();

}

function copyText(){

let text=document.getElementById("textInput");

navigator.clipboard.writeText(text.value);

alert("Text copied!");

}

function clearText(){

document.getElementById("textInput").value="";

}

</script>

</body>

</html>
