<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Generator – PrimePixel Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

:root{
--black:#000;
--card:#111827;
--blue:#3bc1ff;
--text:#e5e7eb;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#000;
color:var(--text);
}

/* PRELOADER */

#preloader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
transition:opacity .6s ease, visibility .6s ease;
}

#preloader.fade-out{
opacity:0;
visibility:hidden;
}

#preloader img{
width:170px;
margin-bottom:25px;
animation:pulse 2s infinite;
}

.loader-bar{
width:170px;
height:2px;
background:#222;
overflow:hidden;
}

.loader-bar::after{
content:'';
display:block;
height:100%;
width:50%;
background:var(--blue);
animation:loading 1.2s infinite;
}

@keyframes loading{
0%{transform:translateX(-100%)}
100%{transform:translateX(200%)}
}

@keyframes pulse{
0%{opacity:.5}
100%{opacity:1}
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:#000;
border-bottom:1px solid rgba(59,193,255,0.3);
position:sticky;
top:0;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
font-size:22px;
font-weight:800;
font-family:'Montserrat',sans-serif;
}

.logo img{
height:36px;
margin-right:10px;
}

.logo span{
color:var(--blue);
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:14px;
}

/* MOBILE MENU */

.menu-btn{
display:none;
font-size:26px;
cursor:pointer;
}

.mobile-menu{
display:none;
position:absolute;
top:70px;
right:20px;
background:#111;
border:1px solid rgba(59,193,255,0.4);
border-radius:8px;
padding:20px;
flex-direction:column;
gap:15px;
}

.mobile-menu a{
text-decoration:none;
color:white;
}

/* PAGE TITLE */

.page-title{
text-align:center;
margin-top:60px;
font-family:'Montserrat',sans-serif;
}

.page-title h1{
font-size:40px;
}

.page-title span{
color:var(--blue);
}

/* GENERATOR */

.generator{
max-width:500px;
margin:60px auto;
background:var(--card);
padding:40px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.05);
text-align:center;
}

.password-box{
display:flex;
margin-top:20px;
}

.password-box input{
flex:1;
padding:12px;
background:#000;
border:1px solid #333;
color:white;
border-radius:6px 0 0 6px;
}

.password-box button{
padding:12px 20px;
background:var(--blue);
border:none;
cursor:pointer;
border-radius:0 6px 6px 0;
}

.options{
margin-top:25px;
text-align:left;
}

.options label{
display:block;
margin-top:10px;
}

.length{
margin-top:20px;
}

.generate-btn{
margin-top:25px;
padding:12px 25px;
background:var(--blue);
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
width:100%;
}

/* FOOTER */

footer{
background:#0a0a0a;
padding:40px;
text-align:center;
margin-top:80px;
}

footer p{
color:#9ca3af;
}

/* MOBILE */

@media(max-width:768px){

.nav-links{
display:none;
}

.menu-btn{
display:block;
}

.mobile-menu.active{
display:flex;
}

}

</style>

</head>

<body>

<!-- PRELOADER -->

<div id="preloader">

<img src="preloader-logo.png">

<div class="loader-bar"></div>

</div>

<!-- NAVBAR -->

<nav>

<div class="logo">

<img src="logo.png">

PrimePixel <span>Tools</span>

</div>

<div class="nav-links">

<a href="index.html">Home</a>
<a href="index.html#tools">All Tools</a>

</div>

<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div class="mobile-menu" id="mobileMenu">

<a href="index.html">Home</a>
<a href="index.html#tools">All Tools</a>

</div>

</nav>

<!-- TITLE -->

<section class="page-title">

<h1>Password <span>Generator</span></h1>

</section>

<!-- GENERATOR -->

<div class="generator">

<div class="password-box">

<input type="text" id="password" readonly>

<button onclick="copyPassword()">Copy</button>

</div>

<div class="length">

<label>Password Length: <span id="lengthValue">12</span></label>

<input type="range" min="6" max="32" value="12" id="lengthSlider" oninput="updateLength()">

</div>

<div class="options">

<label><input type="checkbox" id="uppercase" checked> Include Uppercase</label>

<label><input type="checkbox" id="lowercase" checked> Include Lowercase</label>

<label><input type="checkbox" id="numbers" checked> Include Numbers</label>

<label><input type="checkbox" id="symbols"> Include Symbols</label>

</div>

<button class="generate-btn" onclick="generatePassword()">Generate Password</button>

</div>

<!-- FOOTER -->

<footer>

<p>© 2026 PrimePixel</p>

</footer>

<script>

/* PRELOADER */

window.onload=function(){

setTimeout(function(){

document.getElementById("preloader").classList.add("fade-out");

},1200);

};

/* MOBILE MENU */

function toggleMenu(){

document.getElementById("mobileMenu").classList.toggle("active");

}

/* PASSWORD GENERATOR */

function updateLength(){

document.getElementById("lengthValue").innerText=
document.getElementById("lengthSlider").value;

}

function generatePassword(){

let length=document.getElementById("lengthSlider").value;

let upper="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let lower="abcdefghijklmnopqrstuvwxyz";
let numbers="0123456789";
let symbols="!@#$%^&*()_+";

let chars="";

if(document.getElementById("uppercase").checked) chars+=upper;
if(document.getElementById("lowercase").checked) chars+=lower;
if(document.getElementById("numbers").checked) chars+=numbers;
if(document.getElementById("symbols").checked) chars+=symbols;

if(chars===""){
alert("Select at least one option");
return;
}

let password="";

for(let i=0;i<length;i++){

password+=chars.charAt(Math.floor(Math.random()*chars.length));

}

document.getElementById("password").value=password;

}

function copyPassword(){

let pass=document.getElementById("password");

pass.select();
document.execCommand("copy");

alert("Password copied!");

}

</script>

</body>

</html>
