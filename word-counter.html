<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Word Counter – PrimePixel Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

:root{
--black:#000;
--card:#111827;
--blue:#3bc1ff;
--text:#e5e7eb;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#000;
color:var(--text);
}

/* PRELOADER */

#preloader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
transition:opacity .6s ease, visibility .6s ease;
}

#preloader.fade-out{
opacity:0;
visibility:hidden;
}

#preloader img{
width:170px;
margin-bottom:25px;
animation:pulse 2s infinite;
}

.loader-bar{
width:170px;
height:2px;
background:#222;
overflow:hidden;
}

.loader-bar::after{
content:'';
display:block;
height:100%;
width:50%;
background:var(--blue);
animation:loading 1.2s infinite;
}

@keyframes loading{
0%{transform:translateX(-100%)}
100%{transform:translateX(200%)}
}

@keyframes pulse{
0%{opacity:.5}
100%{opacity:1}
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:#000;
border-bottom:1px solid rgba(59,193,255,0.3);
position:sticky;
top:0;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
font-size:22px;
font-weight:800;
font-family:'Montserrat',sans-serif;
}

.logo img{
height:36px;
margin-right:10px;
}

.logo span{
color:var(--blue);
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:14px;
}

/* MOBILE MENU */

.menu-btn{
display:none;
font-size:26px;
cursor:pointer;
}

.mobile-menu{
display:none;
position:absolute;
top:70px;
right:20px;
background:#111;
border:1px solid rgba(59,193,255,0.4);
border-radius:8px;
padding:20px;
flex-direction:column;
gap:15px;
}

.mobile-menu a{
text-decoration:none;
color:white;
}

/* PAGE TITLE */

.page-title{
text-align:center;
margin-top:60px;
font-family:'Montserrat',sans-serif;
}

.page-title h1{
font-size:40px;
}

.page-title span{
color:var(--blue);
}

/* TOOL AREA */

.tool-box{
max-width:700px;
margin:60px auto;
background:var(--card);
padding:40px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.05);
}

textarea{
width:100%;
height:200px;
padding:15px;
background:#000;
border:1px solid #333;
color:white;
border-radius:8px;
resize:none;
font-size:15px;
}

/* RESULTS */

.results{
margin-top:25px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.result-box{
background:#000;
padding:15px;
border-radius:8px;
text-align:center;
border:1px solid #333;
}

.result-box h3{
color:var(--blue);
margin-bottom:5px;
}

/* FOOTER */

footer{
background:#0a0a0a;
padding:40px;
text-align:center;
margin-top:80px;
}

footer p{
color:#9ca3af;
}

/* MOBILE */

@media(max-width:768px){

.nav-links{
display:none;
}

.menu-btn{
display:block;
}

.mobile-menu.active{
display:flex;
}

.results{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<!-- PRELOADER -->

<div id="preloader">

<img src="preloader-logo.png">

<div class="loader-bar"></div>

</div>

<!-- NAVBAR -->

<nav>

<div class="logo">

<img src="logo.png">

PrimePixel <span>Tools</span>

</div>

<div class="nav-links">

<a href="index.html">Home</a>
<a href="index.html#tools">All Tools</a>

</div>

<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div class="mobile-menu" id="mobileMenu">

<a href="index.html">Home</a>
<a href="index.html#tools">All Tools</a>

</div>

</nav>

<!-- TITLE -->

<section class="page-title">

<h1>Word <span>Counter</span></h1>

</section>

<!-- TOOL -->

<div class="tool-box">

<textarea id="text" placeholder="Start typing or paste your text here..." oninput="countText()"></textarea>

<div class="results">

<div class="result-box">
<h3 id="words">0</h3>
<p>Words</p>
</div>

<div class="result-box">
<h3 id="characters">0</h3>
<p>Characters</p>
</div>

<div class="result-box">
<h3 id="nospace">0</h3>
<p>Characters (no spaces)</p>
</div>

<div class="result-box">
<h3 id="sentences">0</h3>
<p>Sentences</p>
</div>

</div>

</div>

<!-- FOOTER -->

<footer>

<p>© 2026 PrimePixel</p>

</footer>

<script>

/* PRELOADER */

window.onload=function(){

setTimeout(function(){

document.getElementById("preloader").classList.add("fade-out");

},1200);

};

/* MOBILE MENU */

function toggleMenu(){

document.getElementById("mobileMenu").classList.toggle("active");

}

/* WORD COUNTER */

function countText(){

let text=document.getElementById("text").value;

let words=text.trim().split(/\s+/).filter(function(word){return word.length>0}).length;

let characters=text.length;

let nospace=text.replace(/\s/g,'').length;

let sentences=text.split(/[.!?]+/).filter(function(s){return s.trim().length>0}).length;

document.getElementById("words").innerText=words;

document.getElementById("characters").innerText=characters;

document.getElementById("nospace").innerText=nospace;

document.getElementById("sentences").innerText=sentences;

}

</script>

</body>

</html>
