<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Age Calculator – PrimePixel Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

:root{
--black:#000;
--card:#111827;
--blue:#3bc1ff;
--text:#e5e7eb;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#000;
color:var(--text);
}

/* PRELOADER */

#preloader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
transition:opacity .6s ease, visibility .6s ease;
}

#preloader.fade-out{
opacity:0;
visibility:hidden;
}

#preloader img{
width:170px;
margin-bottom:25px;
animation:pulse 2s infinite;
}

.loader-bar{
width:170px;
height:2px;
background:#222;
overflow:hidden;
}

.loader-bar::after{
content:'';
display:block;
height:100%;
width:50%;
background:var(--blue);
animation:loading 1.2s infinite;
}

@keyframes loading{
0%{transform:translateX(-100%)}
100%{transform:translateX(200%)}
}

@keyframes pulse{
0%{opacity:.5}
100%{opacity:1}
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:#000;
border-bottom:1px solid rgba(59,193,255,0.3);
position:sticky;
top:0;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
font-size:22px;
font-weight:800;
font-family:'Montserrat',sans-serif;
}

.logo img{
height:36px;
margin-right:10px;
}

.logo span{
color:var(--blue);
}

/* NAV LINKS */

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:14px;
}

/* MOBILE MENU */

.menu-btn{
display:none;
font-size:26px;
cursor:pointer;
}

.mobile-menu{
display:none;
position:absolute;
top:70px;
right:20px;
background:#111;
border:1px solid rgba(59,193,255,0.4);
border-radius:8px;
padding:20px;
flex-direction:column;
gap:15px;
}

.mobile-menu a{
text-decoration:none;
color:white;
}

/* PAGE TITLE */

.page-title{
text-align:center;
margin-top:60px;
font-family:'Montserrat',sans-serif;
}

.page-title h1{
font-size:40px;
}

.page-title span{
color:var(--blue);
}

/* CALCULATOR */

.calculator{
max-width:450px;
margin:60px auto;
background:var(--card);
padding:40px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.05);
text-align:center;
}

.calculator input{
width:100%;
padding:12px;
margin-top:15px;
background:#000;
border:1px solid #333;
color:white;
border-radius:6px;
}

.calculator button{
margin-top:20px;
padding:12px 25px;
background:var(--blue);
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.result{
margin-top:25px;
font-size:20px;
}

/* FOOTER */

footer{
background:#0a0a0a;
padding:40px;
text-align:center;
margin-top:80px;
}

footer p{
color:#9ca3af;
}

/* MOBILE */

@media(max-width:768px){

.nav-links{
display:none;
}

.menu-btn{
display:block;
}

.mobile-menu.active{
display:flex;
}

}

</style>

</head>

<body>

<!-- PRELOADER -->

<div id="preloader">

<img src="preloader-logo.png">

<div class="loader-bar"></div>

</div>

<!-- NAVBAR -->

<nav>

<div class="logo">

<img src="logo.png">

PrimePixel <span>Tools</span>

</div>

<div class="nav-links">

<a href="index.html">Home</a>
<a href="index.html#tools">All Tools</a>

</div>

<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div class="mobile-menu" id="mobileMenu">

<a href="index.html">Home</a>
<a href="index.html#tools">All Tools</a>

</div>

</nav>

<!-- TITLE -->

<section class="page-title">

<h1>Age <span>Calculator</span></h1>

</section>

<!-- CALCULATOR -->

<div class="calculator">

<label>Enter Your Birth Date</label>

<input type="date" id="dob">

<button onclick="calculateAge()">Calculate Age</button>

<div class="result" id="result"></div>

</div>

<!-- FOOTER -->

<footer>

<p>© 2026 PrimePixel</p>

</footer>

<script>

/* PRELOADER */

window.onload = function(){

setTimeout(function(){

document.getElementById("preloader").classList.add("fade-out");

},1200);

};

/* MOBILE MENU */

function toggleMenu(){

document.getElementById("mobileMenu").classList.toggle("active");

}

/* AGE CALCULATOR */

function calculateAge(){

let dob = document.getElementById("dob").value;

if(!dob){
document.getElementById("result").innerHTML="Please select birth date";
return;
}

let birthDate = new Date(dob);
let today = new Date();

let age = today.getFullYear() - birthDate.getFullYear();

let m = today.getMonth() - birthDate.getMonth();

if(m < 0 || (m === 0 && today.getDate() < birthDate.getDate())){
age--;
}

document.getElementById("result").innerHTML="Your Age: " + age + " Years";

}

</script>

</body>

</html>
