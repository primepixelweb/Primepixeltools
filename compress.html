<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Compressor – PrimePixel Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
--blue:#3bc1ff;
--card:#111827;
--text:#e5e7eb;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
font-family:'Inter',sans-serif;
color:var(--text);
}

/* PRELOADER */

#preloader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
transition:opacity .6s, visibility .6s;
}

#preloader.fade{
opacity:0;
visibility:hidden;
}

#preloader img{
width:170px;
margin-bottom:25px;
}

.loader{
width:150px;
height:2px;
background:#222;
overflow:hidden;
}

.loader::after{
content:'';
display:block;
height:100%;
width:50%;
background:var(--blue);
animation:load 1.2s infinite;
}

@keyframes load{
0%{transform:translateX(-100%)}
100%{transform:translateX(200%)}
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
border-bottom:1px solid rgba(59,193,255,.3);
position:sticky;
top:0;
background:#000;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
font-family:'Montserrat';
font-weight:800;
font-size:22px;
}

.logo img{
height:36px;
margin-right:10px;
}

.logo span{
color:var(--blue);
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
text-decoration:none;
color:white;
font-size:14px;
}

/* MOBILE MENU */

.menu-btn{
display:none;
font-size:26px;
cursor:pointer;
}

.mobile-menu{
display:none;
position:absolute;
top:70px;
right:20px;
background:#111;
border:1px solid rgba(59,193,255,.4);
border-radius:8px;
padding:20px;
flex-direction:column;
gap:15px;
}

.mobile-menu a{
text-decoration:none;
color:white;
}

/* PAGE */

.container{
max-width:700px;
margin:auto;
padding:80px 20px;
text-align:center;
}

.container h1{
font-family:'Montserrat';
font-size:40px;
margin-bottom:10px;
}

.container span{
color:var(--blue);
}

.container p{
color:#9ca3af;
margin-bottom:40px;
}

/* TOOL */

.compressor{
background:var(--card);
padding:40px;
border-radius:10px;
border:1px solid rgba(255,255,255,.05);
}

input{
margin-top:20px;
margin-bottom:20px;
}

.preview img{
max-width:100%;
border-radius:8px;
margin-top:20px;
}

button{
margin-top:20px;
padding:12px 20px;
background:var(--blue);
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

/* FOOTER */

footer{
background:#0a0a0a;
text-align:center;
padding:40px;
margin-top:80px;
}

footer p{
color:#9ca3af;
}

/* MOBILE */

@media(max-width:768px){

.nav-links{
display:none;
}

.menu-btn{
display:block;
}

.mobile-menu.active{
display:flex;
}

.container h1{
font-size:28px;
}

}

</style>

</head>

<body>

<!-- PRELOADER -->

<div id="preloader">

<img src="preloader-logo.png">

<div class="loader"></div>

</div>

<!-- NAVBAR -->

<nav>

<div class="logo">

<img src="logo.png">

PrimePixel <span>Tools</span>

</div>

<div class="nav-links">

<a href="index.html">Home</a>
<a href="index.html#tools">Tools</a>

</div>

<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div class="mobile-menu" id="mobileMenu">

<a href="index.html" onclick="closeMenu()">Home</a>
<a href="index.html#tools" onclick="closeMenu()">Tools</a>

</div>

</nav>

<!-- CONTENT -->

<section class="container">

<h1>Image <span>Compressor</span></h1>

<p>Reduce image size quickly without losing much quality</p>

<div class="compressor">

<input type="file" id="upload" accept="image/*">

<label>Compression Quality</label>

<input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.7">

<div class="preview" id="preview"></div>

<button onclick="compressImage()">Compress Image</button>

<a id="downloadLink" style="display:none" download="compressed.jpg">
<button>Download Image</button>
</a>

</div>

</section>

<!-- FOOTER -->

<footer>

<p>© 2026 PrimePixel</p>

</footer>

<script>

/* PRELOADER */

window.onload=function(){

setTimeout(function(){

document.getElementById("preloader").classList.add("fade");

},1000);

};

/* MOBILE MENU */

function toggleMenu(){

document.getElementById("mobileMenu").classList.toggle("active");

}

function closeMenu(){

document.getElementById("mobileMenu").classList.remove("active");

}

/* IMAGE COMPRESSOR */

function compressImage(){

let file=document.getElementById("upload").files[0];
let quality=document.getElementById("quality").value;

if(!file){

alert("Please upload an image");

return;

}

let reader=new FileReader();

reader.onload=function(e){

let img=new Image();

img.src=e.target.result;

img.onload=function(){

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

let compressed=canvas.toDataURL("image/jpeg",quality);

let preview=document.getElementById("preview");

preview.innerHTML="<img src='"+compressed+"'>";

let download=document.getElementById("downloadLink");

download.href=compressed;
download.style.display="inline-block";

};

};

reader.readAsDataURL(file);

}

</script>

</body>

</html>
